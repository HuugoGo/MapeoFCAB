<style>

    font-family: 'Montserrat', sans-serif;

    font-size: 11px; color: var(--muted); letter-spacing: 0.06em;
  }

  /* ── CANVAS ── */

    border-radius: 8px;

// Smart label wrapping: max 3 lines, ~14 chars per line, split at natural points
function wrapLabel(name) {
  const words = name.split(' ');
  if (words.length === 1) return [name];

  // Try to find splits at prepositions/articles for natural breaks
  const BREAK_WORDS = new Set(['de','del','la','las','los','el','y','por','en','a']);

  // Score a partition into lines: penalize long lines, reward breaking at prepositions
  function buildLines(words, splits) {
    const lines = [];
    let prev = 0;
    for (const s of [...splits, words.length]) {
      lines.push(words.slice(prev, s).join(' '));
      prev = s;
    }
    return lines;
  }

  function score(lines) {
    const maxLen = Math.max(...lines.map(l => l.length));
    return maxLen; // lower is better
  }

  const n = words.length;

  // 1 line
  if (name.length <= 14) return [name];

  // Try 2 lines
  let best2 = null, bestScore2 = Infinity;
  for (let i = 1; i < n; i++) {
    const lines = buildLines(words, [i]);
    const s = score(lines);
    // prefer splitting after prepositions or before them
    const bonus = BREAK_WORDS.has(words[i]?.toLowerCase()) || BREAK_WORDS.has(words[i-1]?.toLowerCase()) ? -2 : 0;
    if (s + bonus < bestScore2) { bestScore2 = s + bonus; best2 = lines; }
  }

  // Try 3 lines (only if still too long)
  if (bestScore2 <= 16 || n <= 3) return best2;

  let best3 = null, bestScore3 = Infinity;
  for (let i = 1; i < n - 1; i++) {
    for (let j = i + 1; j < n; j++) {
      const lines = buildLines(words, [i, j]);
      const s = score(lines);
      if (s < bestScore3) { bestScore3 = s; best3 = lines; }
    }
  }
  return best3 || best2;
}

// Labels
node.append('text')
  .attr('text-anchor','middle')
  .attr('font-family','Montserrat, sans-serif')
  .attr('font-size', d => d.in_degree >= 8 ? '10px' : '9px')
  .attr('fill', d => d.in_degree >= 4 ? '#1a3d38' : 'rgba(40,80,74,0.75)')
  .attr('pointer-events','none')
  .each(function(d) {
    const text = d3.select(this);
    const lines = wrapLabel(d.id);
    const r = rScale(d.in_degree);
    const lineH = 11;
    lines.forEach((line, i) => {
      text.append('tspan')
        .attr('x', 0)
        .attr('dy', i === 0 ? (r + 10) + 'px' : lineH + 'px')
        .text(line);
    });
  });

// Tooltip
const tooltip = document.getElementById('tooltip');
const ttName = document.getElementById('tt-name');
const ttIn = document.getElementById('tt-in');
const ttOut = document.getElementById('tt-out');

node.on('mouseover', function(event, d) {
    const connectedIds = new Set();
    EDGES.forEach(e => {
      if (e.source.id === d.id) connectedIds.add(e.target.id);
      if (e.target.id === d.id) connectedIds.add(e.source.id);
    });
    connectedIds.add(d.id);

    // dim/highlight nodes
    node.selectAll('circle')
      .attr('fill-opacity', n => connectedIds.has(n.id) ? 1 : 0.1)
      .attr('stroke-width', n => n.id === d.id ? 3 : (connectedIds.has(n.id) ? 2 : 1));
    node.selectAll('text')
      .attr('fill', n => connectedIds.has(n.id) ? '#0d1f1c' : 'rgba(40,80,74,0.15)');

    // highlight/dim edges
    link
      .attr('stroke', e => (e.source.id===d.id||e.target.id===d.id) ? 'rgba(42,157,143,0.8)' : 'rgba(42,157,143,0.04)')
      .attr('stroke-width', e => (e.source.id===d.id||e.target.id===d.id) ? 2.5 : 0.8);

    // tooltip
    ttName.textContent = d.id;
    ttIn.textContent = d.in_degree;
    ttOut.textContent = outDeg[d.id] || 0;
    tooltip.classList.add('visible');
  })
  .on('mousemove', function(event) {
    const x = event.clientX + 16, y = event.clientY - 10;
    tooltip.style.left = (x + 260 > W ? x - 280 : x) + 'px';
    tooltip.style.top = y + 'px';
  })
  .on('mouseout', function() {
    node.selectAll('circle')
      .attr('fill-opacity', n => n.in_degree===0 ? 0.50 : 0.75)
      .attr('stroke-width', n => n.in_degree >= 5 ? 2.5 : 1.5);
    node.selectAll('text')
      .attr('fill', n => n.in_degree >= 4 ? '#1a3d38' : 'rgba(40,80,74,0.75)');
    link.attr('stroke','rgba(42,157,143,0.2)').attr('stroke-width',1.2);
    tooltip.classList.remove('visible');
  });

// Simulation tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Drag
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Zoom
const zoom = d3.zoom().scaleExtent([0.15, 4]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

document.getElementById('btn-zoom-in').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.4);
document.getElementById('btn-zoom-out').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.7);
document.getElementById('btn-reset').onclick = () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(0.9).translate(-W/2,-H/2));

// Search
const searchEl = document.getElementById('search');
searchEl.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  node.selectAll('circle')
    .attr('fill-opacity', d => {
      if (!q) return d.in_degree===0 ? 0.55 : 0.8;
      return d.id.toLowerCase().includes(q) ? 1 : 0.12;
    })
    .attr('stroke-width', d => {
      if (!q) return d.in_degree>=5 ? 2 : 1.2;
      return d.id.toLowerCase().includes(q) ? 3 : 1;
    });
  node.selectAll('text')
    .attr('fill', d => {
      if (!q) return d.in_degree>=4 ? '#1a3d38' : 'rgba(40,80,74,0.75)';
      return d.id.toLowerCase().includes(q) ? '#0d1f1c' : 'rgba(40,80,74,0.2)';
    });
  link.attr('stroke', e => {
    if (!q) return 'rgba(42,157,143,0.2)';
    const sm = e.source.id?.toLowerCase().includes(q)||e.source.toLowerCase?.()?.includes(q);
    const tm = e.target.id?.toLowerCase().includes(q)||e.target.toLowerCase?.()?.includes(q);
    return (sm||tm) ? 'rgba(42,157,143,0.7)' : 'rgba(42,157,143,0.04)';
  });
});

// Resize
window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  svg.attr('width', W).attr('height', H);
  simulation.force('center', d3.forceCenter(W/2, H/2)).alpha(0.3).restart();
});
</script>
</body>
</html>
